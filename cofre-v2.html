<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FinanceFlow PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#0e1117;
  --nav:#141720;
  --surface:#1a1e2e;
  --surface2:#20263a;
  --border:#2d3550;
  --text:#e6ecff;
  --muted:#95a0c5;

  --green:#00d4a0;
  --red:#ff5370;
  --blue:#4d9fff;
  --yellow:#ffd166;
  --purple:#b47cff;
  --teal:#06d6c0;

  --radius:14px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans',sans-serif;
  overflow-x:hidden;
}

/* NAV */

nav{
  background:var(--nav);
  border-bottom:1px solid var(--border);
  padding:14px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:800;
  font-size:1.1rem;
  color:var(--green);
}

.logo-box{
  width:34px;
  height:34px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--green),var(--teal));
  display:flex;
  align-items:center;
  justify-content:center;
}

.tabs{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

.tab-btn{
  border:none;
  background:transparent;
  color:var(--muted);
  padding:10px 16px;
  border-radius:12px;
  cursor:pointer;
  font-weight:700;
  transition:.25s;
}

.tab-btn:hover{
  background:var(--surface);
  color:white;
}

.tab-btn.active{
  background:var(--green);
  color:#04140f;
}

/* MAIN */

main{
  max-width:1500px;
  margin:auto;
  padding:24px;
}

.page{
  display:none;
  animation:fade .25s ease;
}

.page.active{
  display:block;
}

@keyframes fade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

/* CARDS */

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:18px;
  margin-bottom:24px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:22px;
  position:relative;
  overflow:hidden;
}

.card::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:4px;
}

.card.green::before{background:var(--green);}
.card.red::before{background:var(--red);}
.card.blue::before{background:var(--blue);}
.card.teal::before{background:var(--teal);}

.card small{
  color:var(--muted);
  text-transform:uppercase;
  font-weight:700;
  letter-spacing:.08em;
}

.card h2{
  margin-top:10px;
  font-size:2rem;
}

/* FORM */

.form-box{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:24px;
  margin-bottom:24px;
}

.form-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
}

.field{
  display:flex;
  flex-direction:column;
  gap:7px;
}

.field label{
  font-size:.75rem;
  font-weight:700;
  color:var(--muted);
  text-transform:uppercase;
}

.field input,
.field select{
  background:var(--surface2);
  border:1px solid var(--border);
  color:white;
  padding:12px;
  border-radius:12px;
  outline:none;
}

.field input:focus,
.field select:focus{
  border-color:var(--green);
}

/* BUTTON */

.btn{
  border:none;
  padding:13px 20px;
  border-radius:12px;
  font-weight:800;
  cursor:pointer;
  transition:.25s;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  box-shadow:0 5px 16px rgba(0,0,0,.2);
}

.btn:hover{
  transform:translateY(-2px);
}

.btn:active{
  transform:scale(.98);
}

.btn.green{
  background:var(--green);
  color:#06140f;
}

.btn.red{
  background:var(--red);
  color:white;
}

.btn.blue{
  background:var(--blue);
  color:#06111d;
}

.btn.purple{
  background:var(--purple);
  color:white;
}

/* TABLE */

.table-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
}

table{
  width:100%;
  border-collapse:collapse;
}

thead{
  background:var(--surface2);
}

thead th{
  padding:14px;
  text-align:left;
  color:var(--muted);
  font-size:.75rem;
  text-transform:uppercase;
}

tbody tr{
  border-top:1px solid var(--border);
  animation:fade .25s ease;
}

tbody tr:hover{
  background:rgba(255,255,255,.02);
}

tbody td{
  padding:14px;
}

.value-positive{
  color:var(--green);
  font-weight:800;
}

.value-negative{
  color:var(--red);
  font-weight:800;
}

/* DELETE */

.delete-btn{
  width:34px;
  height:34px;
  border:none;
  border-radius:10px;
  background:rgba(255,83,112,.15);
  color:var(--red);
  cursor:pointer;
  transition:.2s;
}

.delete-btn:hover{
  background:var(--red);
  color:white;
}

/* TOAST */

.toast{
  position:fixed;
  right:20px;
  bottom:20px;
  background:var(--surface2);
  border:1px solid var(--border);
  padding:14px 20px;
  border-radius:12px;
  animation:fade .25s ease;
  z-index:9999;
}

@media(max-width:700px){

  nav{
    flex-direction:column;
    align-items:flex-start;
  }

  .tabs{
    width:100%;
    overflow:auto;
  }

}

</style>
</head>

<body>

<nav>

  <div class="logo">
    <div class="logo-box">💹</div>
    FinanceFlow PRO
  </div>

  <div class="tabs">
    <button type="button" class="tab-btn active" onclick="showPage('dashboard',this)">Dashboard</button>
    <button type="button" class="tab-btn" onclick="showPage('receitas',this)">Receitas</button>
    <button type="button" class="tab-btn" onclick="showPage('despesas',this)">Despesas</button>
    <button type="button" class="tab-btn" onclick="showPage('investimentos',this)">Investimentos</button>
  </div>

</nav>

<main>

<!-- DASHBOARD -->

<section id="dashboard" class="page active">

<div class="cards">

<div class="card green">
  <small>Receitas</small>
  <h2 id="totalReceitas">R$ 0</h2>
</div>

<div class="card red">
  <small>Despesas</small>
  <h2 id="totalDespesas">R$ 0</h2>
</div>

<div class="card blue">
  <small>Investimentos</small>
  <h2 id="totalInvestimentos">R$ 0</h2>
</div>

<div class="card teal">
  <small>Saldo</small>
  <h2 id="saldoFinal">R$ 0</h2>
</div>

</div>

</section>

<!-- RECEITAS -->

<section id="receitas" class="page">

<div class="form-box">

<div class="form-grid">

<div class="field">
<label>Descrição</label>
<input type="text" id="rDesc">
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="rVal">
</div>

<div class="field">
<label>Categoria</label>
<select id="rCat">
<option>Salário</option>
<option>Freelance</option>
<option>Dividendos</option>
<option>Outros</option>
</select>
</div>

<div class="field">
<label>Data</label>
<input type="date" id="rData">
</div>

<div class="field">
<label>&nbsp;</label>
<button type="button" class="btn green" onclick="addReceita(event)">
＋ Adicionar
</button>
</div>

</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Descrição</th>
<th>Categoria</th>
<th>Data</th>
<th>Valor</th>
<th></th>
</tr>
</thead>

<tbody id="tblReceitas"></tbody>

</table>

</div>

</section>

<!-- DESPESAS -->

<section id="despesas" class="page">

<div class="form-box">

<div class="form-grid">

<div class="field">
<label>Descrição</label>
<input type="text" id="dDesc">
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="dVal">
</div>

<div class="field">
<label>Categoria</label>
<select id="dCat">
<option>Moradia</option>
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
</select>
</div>

<div class="field">
<label>Data</label>
<input type="date" id="dData">
</div>

<div class="field">
<label>&nbsp;</label>
<button type="button" class="btn red" onclick="addDespesa(event)">
＋ Adicionar
</button>
</div>

</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Descrição</th>
<th>Categoria</th>
<th>Data</th>
<th>Valor</th>
<th></th>
</tr>
</thead>

<tbody id="tblDespesas"></tbody>

</table>

</div>

</section>

<!-- INVESTIMENTOS -->

<section id="investimentos" class="page">

<div class="form-box">

<div class="form-grid">

<div class="field">
<label>Ativo</label>
<input type="text" id="iDesc">
</div>

<div class="field">
<label>Valor</label>
<input type="number" id="iVal">
</div>

<div class="field">
<label>Tipo</label>
<select id="iTipo">
<option>Ações</option>
<option>FIIs</option>
<option>CDB</option>
<option>ETF</option>
</select>
</div>

<div class="field">
<label>Data</label>
<input type="date" id="iData">
</div>

<div class="field">
<label>&nbsp;</label>
<button type="button" class="btn blue" onclick="addInvestimento(event)">
＋ Adicionar
</button>
</div>

</div>

</div>

<div class="table-wrap">

<table>

<thead>
<tr>
<th>Ativo</th>
<th>Tipo</th>
<th>Data</th>
<th>Valor</th>
<th></th>
</tr>
</thead>

<tbody id="tblInvestimentos"></tbody>

</table>

</div>

</section>

</main>

<script>

const D = {
  receitas:[],
  despesas:[],
  investimentos:[]
};

function formatMoney(v){
  return 'R$ ' + Number(v).toLocaleString('pt-BR',{
    minimumFractionDigits:2
  });
}

function showPage(id,btn){

  document.querySelectorAll('.page')
    .forEach(p=>p.classList.remove('active'));

  document.querySelectorAll('.tab-btn')
    .forEach(b=>b.classList.remove('active'));

  document.getElementById(id).classList.add('active');

  btn.classList.add('active');
}

function toast(msg){

  const old=document.querySelector('.toast');

  if(old) old.remove();

  const el=document.createElement('div');

  el.className='toast';

  el.innerText=msg;

  document.body.appendChild(el);

  setTimeout(()=>{
    el.remove();
  },2500);
}

function saveData(){
  localStorage.setItem('financeflow-pro',JSON.stringify(D));
}

function loadData(){

  const data=localStorage.getItem('financeflow-pro');

  if(data){

    const parsed=JSON.parse(data);

    D.receitas=parsed.receitas || [];
    D.despesas=parsed.despesas || [];
    D.investimentos=parsed.investimentos || [];

  }

}

function updateDashboard(){

  const rec=D.receitas.reduce((a,b)=>a+b.valor,0);

  const des=D.despesas.reduce((a,b)=>a+b.valor,0);

  const inv=D.investimentos.reduce((a,b)=>a+b.valor,0);

  const saldo=rec-des-inv;

  document.getElementById('totalReceitas').innerText=formatMoney(rec);

  document.getElementById('totalDespesas').innerText=formatMoney(des);

  document.getElementById('totalInvestimentos').innerText=formatMoney(inv);

  document.getElementById('saldoFinal').innerText=formatMoney(saldo);
}

function renderReceitas(){

  const tbody=document.getElementById('tblReceitas');

  if(!D.receitas.length){

    tbody.innerHTML=`
      <tr>
        <td colspan="5">Nenhuma receita cadastrada.</td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML=D.receitas.map((r,index)=>`

    <tr>

      <td>${r.desc}</td>

      <td>${r.cat}</td>

      <td>${r.data}</td>

      <td class="value-positive">${formatMoney(r.valor)}</td>

      <td>
        <button type="button"
          class="delete-btn"
          onclick="deleteItem('receitas',${index})">
          ✕
        </button>
      </td>

    </tr>

  `).join('');
}

function renderDespesas(){

  const tbody=document.getElementById('tblDespesas');

  if(!D.despesas.length){

    tbody.innerHTML=`
      <tr>
        <td colspan="5">Nenhuma despesa cadastrada.</td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML=D.despesas.map((d,index)=>`

    <tr>

      <td>${d.desc}</td>

      <td>${d.cat}</td>

      <td>${d.data}</td>

      <td class="value-negative">${formatMoney(d.valor)}</td>

      <td>
        <button type="button"
          class="delete-btn"
          onclick="deleteItem('despesas',${index})">
          ✕
        </button>
      </td>

    </tr>

  `).join('');
}

function renderInvestimentos(){

  const tbody=document.getElementById('tblInvestimentos');

  if(!D.investimentos.length){

    tbody.innerHTML=`
      <tr>
        <td colspan="5">Nenhum investimento cadastrado.</td>
      </tr>
    `;

    return;
  }

  tbody.innerHTML=D.investimentos.map((i,index)=>`

    <tr>

      <td>${i.desc}</td>

      <td>${i.tipo}</td>

      <td>${i.data}</td>

      <td class="value-positive">${formatMoney(i.valor)}</td>

      <td>
        <button type="button"
          class="delete-btn"
          onclick="deleteItem('investimentos',${index})">
          ✕
        </button>
      </td>

    </tr>

  `).join('');
}

function updateAll(){

  renderReceitas();

  renderDespesas();

  renderInvestimentos();

  updateDashboard();

  saveData();
}

/* ADD */

function addReceita(event){

  const btn=event.target;

  btn.disabled=true;

  const desc=document.getElementById('rDesc').value.trim();

  const val=parseFloat(document.getElementById('rVal').value);

  if(!desc || isNaN(val) || val<=0){

    toast('Informe os dados corretamente.');

    btn.disabled=false;

    return;
  }

  D.receitas.unshift({
    desc,
    valor:val,
    cat:document.getElementById('rCat').value,
    data:document.getElementById('rData').value
  });

  document.getElementById('rDesc').value='';
  document.getElementById('rVal').value='';

  updateAll();

  toast('Receita adicionada!');

  setTimeout(()=>{
    btn.disabled=false;
  },400);
}

function addDespesa(event){

  const btn=event.target;

  btn.disabled=true;

  const desc=document.getElementById('dDesc').value.trim();

  const val=parseFloat(document.getElementById('dVal').value);

  if(!desc || isNaN(val) || val<=0){

    toast('Informe os dados corretamente.');

    btn.disabled=false;

    return;
  }

  D.despesas.unshift({
    desc,
    valor:val,
    cat:document.getElementById('dCat').value,
    data:document.getElementById('dData').value
  });

  document.getElementById('dDesc').value='';
  document.getElementById('dVal').value='';

  updateAll();

  toast('Despesa adicionada!');

  setTimeout(()=>{
    btn.disabled=false;
  },400);
}

function addInvestimento(event){

  const btn=event.target;

  btn.disabled=true;

  const desc=document.getElementById('iDesc').value.trim();

  const val=parseFloat(document.getElementById('iVal').value);

  if(!desc || isNaN(val) || val<=0){

    toast('Informe os dados corretamente.');

    btn.disabled=false;

    return;
  }

  D.investimentos.unshift({
    desc,
    valor:val,
    tipo:document.getElementById('iTipo').value,
    data:document.getElementById('iData').value
  });

  document.getElementById('iDesc').value='';
  document.getElementById('iVal').value='';

  updateAll();

  toast('Investimento adicionado!');

  setTimeout(()=>{
    btn.disabled=false;
  },400);
}

/* DELETE */

function deleteItem(tipo,index){

  if(!confirm('Deseja remover este item?')){
    return;
  }

  D[tipo].splice(index,1);

  updateAll();

  toast('Registro removido!');
}

/* INIT */

(function(){

  loadData();

  const hoje=new Date().toISOString().split('T')[0];

  document.querySelectorAll('input[type=date]')
    .forEach(el=>el.value=hoje);

  updateAll();

})();

</script>

</body>
</html>
